    <script>
      // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This happens when polyfills (like formdata-polyfill) try to overwrite window.fetch
      (function() {
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.writable && !descriptor.set && descriptor.configurable) {
            var _fetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return _fetch; },
              set: function(v) { _fetch = v; }
            });
          }
        } catch (e) {
          console.error('Error fixing fetch descriptor:', e);
        }
      })();
    </script>
